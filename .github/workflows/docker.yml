name: Docker Build & Release

on:
  push:
    tags:
      - '*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: pdo_sqlite, mbstring, gd, zip, bcmath

      - name: Install Composer dependencies
        run: |
          composer install --no-dev --no-interaction --optimize-autoloader
          composer clear-cache

      - name: Create archive
        run: |
          TAG=${GITHUB_REF_NAME#v}
          git archive --format=tar --prefix="mpay-flvxbb${TAG}/" HEAD | gzip > "mpay-flvxbb${TAG}.tar.gz"
          echo "ASSET=mpay-flvxbb${TAG}.tar.gz" >> $GITHUB_ENV
          echo "RELEASE_NAME=mpay-flvx v${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "RELEASE_BODY<<RELEASE_BODY_EOF" >> $GITHUB_ENV
          echo "宝塔安装" >> $GITHUB_ENV
          echo "下载 mpay-flvx-v${GITHUB_REF_NAME}.tar.gz 解压到网站目录，配置 Nginx 指向 public/ 目录，域名/install安装即可。" >> $GITHUB_ENV
          echo "详细安装教程请参考原项目：https://gitee.com/technical-laohu/mpay/tree/master" >> $GITHUB_ENV
          echo "RELEASE_BODY_EOF" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_NAME }}
          body: ${{ env.RELEASE_BODY }}
          files: ${{ env.ASSET }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
