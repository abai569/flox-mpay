name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer:v2

      - name: Install dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs

      - name: Build tar.gz package
        run: |
          pkg_name="mpay-flvx-${{ github.ref_name }}"
          tar czf "/tmp/${pkg_name}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitattributes' \
            --exclude='.env.example' \
            --exclude='mpay1.2.4bb' \
            --exclude='wepay-1.8.0.0.apk' \
            --exclude='wxmonitor_v1.4.zip' \
            --exclude='release' \
            .
          mkdir -p release
          mv "/tmp/${pkg_name}.tar.gz" release/

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "release/mpay-flvx-${{ github.ref_name }}.tar.gz" \
            --title "mpay-flvx ${{ github.ref_name }}" \
            --notes "宝塔安装：下载解压到网站目录，运行目录指向 /public，访问 /install 安装。详细教程参考 [原项目](https://gitee.com/technical-laohu/mpay)"
