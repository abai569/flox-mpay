    <script>
        function detectBrowserEnvironment() {
            const userAgent = navigator.userAgent.toLowerCase();
            let environment = 'other';
            if (userAgent.includes('micromessenger')) {
                if (userAgent.includes('miniprogram')) {
                    environment = 'wxapp';
                } else if (userAgent.includes('android') || userAgent.includes('iphone') || userAgent.includes('ipad')) {
                    environment = 'wxphone';
                } else {
                    environment = 'wxpc';
                }
            } else if (userAgent.includes('aliapp') || userAgent.includes('alipayclient')) {
                if (userAgent.includes('android') || userAgent.includes('iphone') || userAgent.includes('ipad')) {
                    environment = 'aliphone';
                } else {
                    environment = 'alipc';
                }
            } else if (userAgent.includes('android') || userAgent.includes('iphone') || userAgent.includes('ipad')) {
                if (!userAgent.includes('micromessenger') && !userAgent.includes('aliapp') && !userAgent.includes('qq')) {
                    environment = 'phone';
                }
            } else {
                environment = 'pc';
            }
            return environment;
        }

        const payCode = '<?php echo $payUrl; ?>';
        const codeType = '<?php echo htmlentities($code_type); ?>';
        const payType = '<?php echo htmlentities($type); ?>';
        const order = '<?php echo htmlentities($order_id); ?>';
        const QR = AwesomeQR.AwesomeQR;

        (async () => {
            // 设置品牌头部
            const payTypeIcon = document.getElementById('payTypeIcon');
            const headerTitle = document.getElementById('headerTitle');
            const payTypeText = document.getElementById('payTypeText');
            const body = document.body;

            if (payType === 'wxpay') {
                payTypeIcon.src = '/static/img/weixin.jpg';
                payTypeText.innerText = '微信';
                headerTitle.innerText = '微信支付';
                body.classList.add('wxpay');
            } else if (payType === 'alipay') {
                payTypeIcon.src = '/static/img/alipay.jpg';
                payTypeText.innerText = '支付宝';
                headerTitle.innerText = '支付宝支付';
                body.classList.add('alipay');
            } else if (payType === 'unionpay') {
                payTypeIcon.src = '/static/img/unionpay.jpg';
                payTypeText.innerText = '云闪付';
                headerTitle.innerText = '云闪付支付';
            }

            // 生成二维码
            if (codeType == 0) {
                document.getElementById('qrcode').src = await getQrcode(payCode, QR);
            } else {
                document.getElementById('qrcode').src = payCode;
            }

            // 订单状态查询
            let orderTimer = 0;
            const queryOrder = async (url) => {
                if (orderTimer) clearTimeout(orderTimer);
                const res = await fetch(url);
                const jsonData = await res.json();
                orderTimer = setTimeout(() => { queryOrder(url); }, 1500);

                if (jsonData.state === 1) {
                    clearTimeout(orderTimer);
                    layer.closeAll();
                    document.getElementById('countdownWrap').style.background = '#f6ffed';
                    document.getElementById('countdownWrap').style.borderColor = '#b7eb8f';
                    document.getElementById('countdownWrap').innerHTML = '<span style="color:#52c41a;font-weight:600;display:flex;align-items:center;gap:4px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg> 支付成功</span>';
                    document.getElementById('qrcode').src = '/static/img/pay_ok.png';
                    setTimeout(() => {
                        location.href = jsonData.return_url;
                    }, 1500);
                }

                timer(jsonData.passtime);
            };
            queryOrder(`/getOrderState/${order}`);
        })();

        // 验证支付结果（单次监听模式）
        /* <?php if ($patt == 0 && $passtime > 0) { ?> */
        const id = '<?php echo htmlentities($id);?>';
        const reVali = (step) => {
            setTimeout(() => {
                layer.confirm('是否已完成支付？', { icon: 3, title: '提示', closeBtn: 0 },
                    (index) => {
                        (async () => {
                            const res = await validatePayResult(id, 1);
                            if (res) reVali(8000);
                        })();
                        layer.close(index);
                    },
                    (index) => {
                        reVali(5000);
                        layer.close(index);
                    }
                );
            }, step);
        };
        reVali(10000);

        async function validatePayResult(id, patt) {
            const lay = layer.load(2);
            let data = { id: id, patt: patt };
            const res1 = await fetch(`/validatePayResult`, {
                method: 'post',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const rec1_info = await res1.json();
            const info = await new Promise((resolve) => {
                setTimeout(() => {
                    data.patt = 0;
                    fetch(`/validatePayResult`, { method: 'post', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
                        .then((res2) => res2.json())
                        .then((rec2_info) => {
                            if (rec2_info.code == 0) {
                                layer.close(lay);
                                layer.msg('验证失败，稍后重新验证！');
                                resolve(true);
                            } else {
                                layer.close(lay);
                                layer.msg(rec2_info.msg);
                                resolve(false);
                            }
                        });
                }, 5000);
            });
            return info;
        }
        /* <?php } ?> */

        // 环境判断与唤起按钮
        const environment = detectBrowserEnvironment();
        if (payType === 'wxpay' && environment === 'aliphone') {
            layer.alert('请使用微信打开此页面');
        } else if (payType === 'alipay' && environment === 'wxphone') {
            layer.alert('请使用支付宝打开此页面');
        }

        const openAppBtn = document.getElementById('openApp');
        if (environment === 'phone') {
            document.getElementById('appBtnWrap').style.display = 'block';
            if (payType === 'wxpay') {
                openAppBtn.innerText = '打开微信支付';
                openAppBtn.classList.add('wxpay');
                openAppBtn.href = 'weixin://';
            } else if (payType === 'alipay') {
                openAppBtn.innerText = '打开支付宝付款';
                openAppBtn.classList.add('alipay');
                if (codeType == 0) {
                    openAppBtn.href = 'alipays://platformapi/startapp?appId=20000067&&url=' + encodeURIComponent(payCode);
                } else {
                    openAppBtn.href = 'alipays://platformapi/startapp?appId=20000067&&url=' + encodeURIComponent(window.location.href);
                }
            }
        }

        async function getQrcode(text, QR) {
            return await new Promise((resolve) => {
                new QR({ text: text, size: 500 }).draw().then((dataURL) => resolve(dataURL));
            });
        }

        function timer(passtime) {
            let minute = 0, second = 0;
            if (passtime > 0) {
                minute = Math.floor(passtime / 60);
                second = Math.floor(passtime) - (minute * 60);
            }
            if (passtime <= 0) {
                document.getElementById('countdownWrap').style.background = '#fff1f0';
                document.getElementById('countdownWrap').style.borderColor = '#ffa39e';
                document.getElementById('countdownWrap').innerHTML = '<span style="color:#ff4d4f;font-weight:600;">订单已过期</span>';
                document.getElementById('qrcode').src = '/static/img/qrcode_timeout.png';
            } else {
                document.getElementById('divTime').innerText = `${minute}分${second < 10 ? '0' : ''}${second}秒`;
            }
        }
    </script>
